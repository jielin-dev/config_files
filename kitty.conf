# ==============================================================================
# TYPOGRAPHY (Official Ubuntu Terminal Fonts)
# ==============================================================================
font_family      Ubuntu Mono Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Adjust line height slightly to match the spacious feel of GNOME terminal
adjust_line_height 110%

# ==============================================================================
# WINDOW LAYOUT & PADDING
# ==============================================================================
# Matches the standard internal border spacing of the Ubuntu terminal
window_padding_width 6

# Disable confirmation prompts when closing windows
confirm_os_window_close 0

# ==============================================================================
# CURSOR CUSTOMIZATION (Classic GNOME Block)
# ==============================================================================
cursor_shape     block
blink_interval   0

# ==============================================================================
# THEME: OFFICIAL UBUNTU GNOME PALETTE
# ==============================================================================
# Ubuntu's iconic deep eggplant/aubergine background and crisp white text
background            #300a24
foreground            #ffffff

# Selection highlight styling
selection_background  #dfdbd2
selection_foreground  #300a24

# Canonical/Ubuntu 16-color ANSI terminal palette mapping
# Normal colors
color0 #2e3436
color1 #cc0000
color2 #4e9a06
color3 #c4a000
color4 #3465a4
color5 #75507b
color6 #06989a
color7 #d3d7cf

# Bright colors
color8  #555753
color9  #ef2929
color10 #8ae234
color11 #fce94f
color12 #729fcf
color13 #ad7fa8
color14 #34e2e2
color15 #eeeeec


# ===========================================
# Key bindings and Window manipulations
# ===========================================

# Side-by-side panes OR one-at-a-time "switch"
enabled_layouts splits,stack

# Open a second pane in the SAME project folder
map f5 launch --cwd=current --location=vsplit
map f6 launch --cwd=current --location=hsplit

# The "switch": toggle current pane to fullscreen and back
map f1 toggle_layout stack

# Pop a pane out into its own full window (your "dis-attach")
map f2 detach_window new-os-window
# ...and detach a whole tab to a new window
map f3 detach_tab new-os-window

# Pull this pane into another existing tab (the reverse of detaching)
map ctrl+f4 detach_window ask
# Or send it straight to the previously active tab, no prompt
map ctrl+f3 detach_window tab-prev

# Same idea at the tab level: fold a whole tab into another OS window
map ctrl+f6 detach_tab ask

# Attention indicators
enabled_layouts splits,stack
tab_activity_symbol "●"
bell_on_tab "🔔 "
window_alert_on_bell yes
# put the bell/activity marker into the tab title
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"

# =======================================================
# Turn off security risks
# =======================================================
# turn off phone home function
update_check_interval 0
# disable remote control
allow_remote_control no
# disable shell integration signaling
shell_integration disabled
# restrict executable handling
open_url_with default
