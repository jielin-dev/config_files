# ==============================================================================
# THEME: OFFICIAL UBUNTU GNOME PALETTE
# ==============================================================================
[colors]
# Ubuntu's iconic deep eggplant/aubergine background and crisp white text
primary = { background = "#300a24", foreground = "#ffffff" }

# Selection highlight styling
selection = { background = "#dfdbd2", text = "#300a24" }

# Canonical/Ubuntu 16-color ANSI terminal palette mapping
[colors.normal]
black   = "#2e3436"
red     = "#cc0000"
green   = "#4e9a06"
yellow  = "#c4a000"
blue    = "#3465a4"
magenta = "#75507b"
cyan    = "#06989a"
white   = "#d3d7cf"

[colors.bright]
black   = "#555753"
red     = "#ef2929"
green   = "#8ae234"
yellow  = "#fce94f"
blue    = "#729fcf"
magenta = "#ad7fa8"
cyan    = "#34e2e2"
white   = "#eeeeec"

# ==============================================================================
# TYPOGRAPHY (Official Ubuntu Terminal Fonts)
# ==============================================================================
[font]
# Ubuntu's native terminal font size defaults to 13.0 for enhanced readability.
size = 13.0

[font.normal]
# Note: If your system uses the newer refreshed font stack, 
# you can change this to "Ubuntu Sans Mono".
family = "Ubuntu Mono"
style = "Regular"

[font.bold]
family = "Ubuntu Mono"
style = "Bold"

[font.italic]
family = "Ubuntu Mono"
style = "Italic"

[font.bold_italic]
family = "Ubuntu Mono"
style = "Bold Italic"

